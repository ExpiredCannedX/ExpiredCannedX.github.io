name: Deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          # 锁定与 pnpm-lock.yaml 中 pnpm 自身版本一致的精确版本，
          # 避免 action-setup 的 self-installer 触发版本切换
          # （切换时会用 headless install 解析多文档 lockfile 的 pnpm 自身子文档，
          # 在 optionalDependencies 缺 resolution 的 snapshot 上抛
          # "Cannot use 'in' operator to search for 'integrity' in undefined"）。
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Build
        run: pnpm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
